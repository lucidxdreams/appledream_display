swagger: '2.0'
info:
  title: Inventory API
  version: 1.0.0
  contact:
    name: API support
    email: api@flowhub.com
  description: These documents contain the current publicly available service APIs. If you need access to different data please email api@flowhub.com.
paths:
  /v0/clientsLocations:
    get:
      description: |-
        List all locations (stores) for the client you are authenticated as.

        This endpoint will provide you with location details associated with the account you are authenticated
        as. The `locationId` values may be used as a parameter in location-specific inventory routes.
      summary: Client Locations
      operationId: ClientsLocationsGet
      produces:
        - application/json
      parameters: []
      responses:
        '200':
          description: Successful response
          schema:
            type: object
            properties:
              status:
                type: integer
                description: Status code
              data:
                type: array
                items:
                  $ref: '#/definitions/Store'
          examples:
            application/json:
              status: 200
              data:
                - address:
                    city: Denver
                    country: ''
                    county: null
                    state: Colorado
                    streetAddress1: 123 Main Street
                    streetAddress2: null
                    zip: '80014'
                  clientId: 0d702b0b-d88f-486d-a1fc-81b8497f72c6
                  clientName: Blazed and Infused
                  email: info@blazedandinfused.cannabis
                  hoursOfOperation: null

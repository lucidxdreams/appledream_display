  /v0/inventory:
    get:
      description: "Returns all inventory items for all client locations (stores) regardless of quantity (i.e. items with\r\nno quantity may be returned). Inventory is summed across all rooms if the item exists in more than one room,\r\nmeaning that you'll only receive *one* item per distinct inventory entry."
